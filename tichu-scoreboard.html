<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Tichu Scoreboard</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Tichu">
<meta name="theme-color" content="#f5f2ed">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f5f2ed; min-height: 100vh; padding: 28px 20px 40px; font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif; position: relative; }

  .score-band { background: #eceae3; border-radius: 16px; padding: 20px 20px 16px; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: flex-end; }
  .team-block { flex: 1; }
  .team-block.right { text-align: right; }
  .team-label { font-size: 11px; color: #9a9488; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 4px; cursor: pointer; border-bottom: 1px dashed #c4bfb4; display: inline-block; padding-bottom: 1px; }
  .team-score { font-size: 56px; font-weight: 500; line-height: 1; display: inline-block; border-radius: 10px; padding: 2px 8px; border: 3px solid transparent; transition: border-color 0.3s; }
  .score-a { color: #8a6a50; }
  .score-b { color: #4a6b7a; }
  .score-a.leading { border-color: #4a6b7a; }
  .score-b.leading { border-color: #8a6a50; }
  .divider-col { padding: 0 12px 6px; font-size: 20px; color: #c4bfb4; font-weight: 300; }

  .input-card { background: #eceae3; border-radius: 16px; padding: 16px 18px; margin-bottom: 14px; }
  .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 8px; }
  .score-input { width: 100%; background: #f5f2ed; border: 0.5px solid #d0cbc2; border-radius: 10px; padding: 12px; font-size: 22px; font-weight: 500; text-align: center; color: #2e2b25; outline: none; font-family: inherit; transition: border-color 0.15s; -moz-appearance: textfield; }
  .score-input::-webkit-outer-spin-button, .score-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .score-input:focus { border-color: #9a9488; }
  .score-input.auto { color: #b0ab9f; }
  .score-input.invalid { border-color: #c97a6a; background: #fdf2ef; }

  .adj-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .adj-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
  .btn-adj { background: #f5f2ed; border: 0.5px solid #d0cbc2; border-radius: 8px; padding: 10px 0; font-size: 13px; font-weight: 500; font-family: inherit; color: #6b6560; cursor: pointer; text-align: center; -webkit-tap-highlight-color: transparent; }
  .btn-adj:active { background: #e0ddd6; }
  .btn-adj.plus { color: #4a7a5a; }
  .btn-adj.minus { color: #9a5a4a; }

  .btn-row { display: grid; grid-template-columns: 1fr 52px; gap: 8px; }
  .btn-add { background: #3a3630; color: #f5f2ed; border: none; border-radius: 10px; padding: 15px; font-size: 15px; font-family: inherit; font-weight: 500; cursor: pointer; letter-spacing: 0.5px; -webkit-tap-highlight-color: transparent; }
  .btn-add:active:not(:disabled) { opacity: 0.75; }
  .btn-add:disabled { background: #c4bfb4; cursor: not-allowed; }
  .btn-undo { background: #d6d1c8; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; color: #5a5550; -webkit-tap-highlight-color: transparent; }
  .btn-undo:active { background: #c8c2b8; }
  .hint { font-size: 11px; color: #b0ab9f; text-align: center; margin-top: 8px; min-height: 16px; }

  .rounds-card { background: #eceae3; border-radius: 16px; overflow: hidden; }
  .rounds-header { display: grid; grid-template-columns: 30px 1fr 1fr; padding: 10px 16px; font-size: 10px; color: #9a9488; letter-spacing: 1.5px; text-transform: uppercase; border-bottom: 0.5px solid #d6d1c8; }
  .rounds-header span:last-child { text-align: right; }
  .round-row { display: grid; grid-template-columns: 30px 1fr 1fr; padding: 10px 16px; font-size: 15px; border-bottom: 0.5px solid #d6d1c8; }
  .round-row:last-child { border-bottom: none; }
  .rnum { color: #b0ab9f; font-size: 11px; display: flex; align-items: center; }
  .ra { color: #8a6a50; font-weight: 500; }
  .rb { color: #4a6b7a; font-weight: 500; text-align: right; }
  .empty-msg { padding: 20px; text-align: center; font-size: 13px; color: #b0ab9f; }

  .win-overlay { display: none; position: fixed; inset: 0; background: rgba(45,40,35,0.7); align-items: center; justify-content: center; z-index: 10; }
  .win-overlay.show { display: flex; }
  .win-box { background: #f5f2ed; border-radius: 20px; padding: 36px 40px; text-align: center; width: 80%; }
  .win-label { font-size: 11px; color: #9a9488; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
  .win-name { font-size: 32px; font-weight: 500; color: #2e2b25; margin-bottom: 4px; }
  .win-score-txt { font-size: 13px; color: #9a9488; margin-bottom: 20px; }
  .btn-restart { background: #3a3630; color: #f5f2ed; border: none; border-radius: 10px; padding: 13px 28px; font-size: 14px; font-family: inherit; cursor: pointer; }
</style>
</head>
<body>

  <div class="score-band">
    <div class="team-block">
      <div class="team-label" id="name-a" onclick="editName('a')">Team A</div>
      <div class="team-score score-a" id="total-a">0</div>
    </div>
    <div class="divider-col">:</div>
    <div class="team-block right">
      <div class="team-label" id="name-b" onclick="editName('b')">Team B</div>
      <div class="team-score score-b" id="total-b">0</div>
    </div>
  </div>

  <div class="input-card">
    <div class="input-row">
      <input class="score-input" id="inp-a" type="number" inputmode="numeric" placeholder="0" />
      <input class="score-input" id="inp-b" type="number" inputmode="numeric" placeholder="0" />
    </div>
    <div class="adj-row">
      <div class="adj-pair">
        <button class="btn-adj plus" onclick="adjust('a', 100)">+100</button>
        <button class="btn-adj minus" onclick="adjust('a', -100)">−100</button>
      </div>
      <div class="adj-pair">
        <button class="btn-adj plus" onclick="adjust('b', 100)">+100</button>
        <button class="btn-adj minus" onclick="adjust('b', -100)">−100</button>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-add" id="btn-add" onclick="addRound()">라운드 추가</button>
      <button class="btn-undo" onclick="undoRound()">↩</button>
    </div>
    <p class="hint" id="hint"></p>
  </div>

  <div class="rounds-card">
    <div class="rounds-header">
      <span>#</span><span>Team A</span><span style="text-align:right">Team B</span>
    </div>
    <div id="rounds-list">
      <div class="empty-msg">아직 라운드가 없습니다</div>
    </div>
  </div>

  <div class="win-overlay" id="win-overlay">
    <div class="win-box">
      <p class="win-label">Winner</p>
      <p class="win-name" id="win-name"></p>
      <p class="win-score-txt" id="win-score"></p>
      <button class="btn-restart" onclick="restartGame()">새 게임 시작</button>
    </div>
  </div>

<script>
  const WIN = 1000;
  let rounds = [];
  let names = { a: 'Team A', b: 'Team B' };

  const inpA = document.getElementById('inp-a');
  const inpB = document.getElementById('inp-b');
  const btnAdd = document.getElementById('btn-add');
  const hint = document.getElementById('hint');

  function lastTwoDigits(v) {
    if (v === '' || isNaN(Number(v))) return null;
    return Math.abs(parseInt(v)) % 100;
  }
  function isValidScore(v) {
    if (v === '' || isNaN(Number(v))) return true;
    return Math.abs(parseInt(v)) % 10 === 0 || Math.abs(parseInt(v)) % 10 === 5;
  }
  function getAutoVal(v) {
    const t = lastTwoDigits(v);
    if (t === null || t === 0) return '';
    return String(100 - t);
  }

  function validate() {
    const va = inpA.value, vb = inpB.value;
    const okA = isValidScore(va), okB = isValidScore(vb);
    inpA.classList.toggle('invalid', !okA);
    inpB.classList.toggle('invalid', !okB);
    btnAdd.disabled = !(okA && okB && !(va === '' && vb === ''));
    hint.textContent = (!okA || !okB) ? '1의 자리는 0 또는 5만 입력 가능합니다' : '';
  }

  inpA.addEventListener('input', () => {
    if (!inpB.matches(':focus')) {
      const auto = getAutoVal(inpA.value);
      if (auto !== '') { inpB.value = auto; inpB.classList.add('auto'); }
      else { inpB.value = ''; inpB.classList.remove('auto'); }
    }
    validate();
  });

  inpB.addEventListener('input', () => {
    if (!inpA.matches(':focus')) {
      const auto = getAutoVal(inpB.value);
      if (auto !== '') { inpA.value = auto; inpA.classList.add('auto'); }
      else { inpA.value = ''; inpA.classList.remove('auto'); }
    }
    validate();
  });

  inpA.addEventListener('focus', () => {
    if (inpA.classList.contains('auto')) { inpA.value = ''; inpA.classList.remove('auto'); validate(); }
  });
  inpB.addEventListener('focus', () => {
    if (inpB.classList.contains('auto')) { inpB.value = ''; inpB.classList.remove('auto'); validate(); }
  });

  function adjust(team, delta) {
    const inp = team === 'a' ? inpA : inpB;
    const cur = parseInt(inp.value) || 0;
    inp.value = cur + delta;
    inp.classList.remove('auto');
    validate();
  }

  function addRound() {
    if (btnAdd.disabled) return;
    const a = parseInt(inpA.value) || 0;
    const b = parseInt(inpB.value) || 0;
    rounds.push({ a, b });
    inpA.value = ''; inpB.value = '';
    inpA.classList.remove('auto', 'invalid');
    inpB.classList.remove('auto', 'invalid');
    hint.textContent = '';
    btnAdd.disabled = true;
    render();
    checkWin();
  }

  function undoRound() {
    if (!rounds.length) return;
    rounds.pop();
    render();
  }

  function render() {
    const ta = rounds.reduce((s, r) => s + r.a, 0);
    const tb = rounds.reduce((s, r) => s + r.b, 0);
    const elA = document.getElementById('total-a');
    const elB = document.getElementById('total-b');
    elA.textContent = ta; elB.textContent = tb;
    elA.classList.remove('leading'); elB.classList.remove('leading');
    if (ta > tb) elA.classList.add('leading');
    else if (tb > ta) elB.classList.add('leading');

    const list = document.getElementById('rounds-list');
    if (!rounds.length) {
      list.innerHTML = '<div class="empty-msg">아직 라운드가 없습니다</div>';
    } else {
      list.innerHTML = rounds.map((r, i) => `
        <div class="round-row">
          <span class="rnum">${i + 1}</span>
          <span class="ra">${r.a >= 0 ? '+' : ''}${r.a}</span>
          <span class="rb">${r.b >= 0 ? '+' : ''}${r.b}</span>
        </div>`).join('');
    }
  }

  function checkWin() {
    const ta = rounds.reduce((s, r) => s + r.a, 0);
    const tb = rounds.reduce((s, r) => s + r.b, 0);
    if (ta >= WIN || tb >= WIN) {
      const aWins = ta >= tb;
      document.getElementById('win-name').textContent = aWins ? names.a : names.b;
      document.getElementById('win-score').textContent = `${aWins ? ta : tb} : ${aWins ? tb : ta}`;
      document.getElementById('win-overlay').classList.add('show');
    }
  }

  function restartGame() {
    rounds = [];
    document.getElementById('win-overlay').classList.remove('show');
    render();
  }

  function editName(team) {
    const next = prompt('팀 이름 변경:', names[team]);
    if (next && next.trim()) {
      names[team] = next.trim();
      document.getElementById(`name-${team}`).textContent = names[team];
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter' && !btnAdd.disabled) addRound(); });
  render();
</script>
</body>
</html>
