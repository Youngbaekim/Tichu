<!DOCTYPE html>
<link rel="manifest" href="manifest.json">
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Tichu Scoreboard</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tichu">
<meta name="theme-color" content="#0f1f2e">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f1f2e; min-height: 100vh; padding: 28px 20px 40px; font-family: -apple-system, BlinkMacSystemFont, sans-serif; position: relative; }
  .score-band { background: #1a2e3f; border-radius: 14px; padding: 20px 20px 16px; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: flex-end; border: 1px solid #2a4a5e; }
  .team-block { flex: 1; } .team-block.right { text-align: right; }
  .team-label { font-size: 11px; color: #7a9bb0; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; cursor: pointer; border-bottom: 1px dashed #2a4a5e; display: inline-block; padding-bottom: 1px; }
  .team-score { font-size: 60px; font-weight: 500; line-height: 1; display: inline-block; border-radius: 10px; padding: 2px 8px; border: 3px solid transparent; transition: border-color 0.3s; }
  .score-a { color: #ff4444; } .score-b { color: #4488ff; }
  .score-a.leading { border-color: #4488ff; } .score-b.leading { border-color: #ff4444; }
  .divider-col { padding: 0 12px 8px; font-size: 20px; color: #2a4a5e; font-weight: 300; }
  .input-card { background: #1a2e3f; border-radius: 14px; padding: 16px 18px; margin-bottom: 14px; border: 1px solid #2a4a5e; }
  .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 8px; }
  .score-input { width: 100%; background: #0f1f2e; border: 1px solid #2a4a5e; border-radius: 10px; padding: 12px; font-size: 24px; font-weight: 500; text-align: center; color: #e0eaf2; outline: none; font-family: inherit; transition: border-color 0.15s; -moz-appearance: textfield; }
  .score-input::-webkit-outer-spin-button, .score-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .score-input:focus { border-color: #4a8fa8; } .score-input.auto { color: #3a5a70; } .score-input.invalid { border-color: #cc2200; background: #1f1010; }
  .adj-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .adj-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
  .btn-adj { background: #0f1f2e; border: 1px solid #2a4a5e; border-radius: 8px; padding: 10px 0; font-size: 13px; font-weight: 500; font-family: inherit; cursor: pointer; text-align: center; }
  .btn-adj.plus { color: #44cc77; } .btn-adj.minus { color: #ff6644; }
  .btn-row { display: grid; grid-template-columns: 1fr 48px; gap: 8px; }
  .btn-add { background: #1d6a3a; color: #d0ffe0; border: none; border-radius: 10px; padding: 15px; font-size: 15px; font-family: inherit; font-weight: 500; cursor: pointer; }
  .btn-add:disabled { background: #1a2e3f; border: 1px solid #2a4a5e; color: #3a5a70; cursor: not-allowed; }
  .btn-undo { background: #1a2e3f; border: 1px solid #2a4a5e; border-radius: 10px; font-size: 18px; cursor: pointer; color: #7a9bb0; }
  .hint { font-size: 11px; color: #cc4422; text-align: center; margin-top: 8px; min-height: 16px; }
  .rounds-card { background: #1a2e3f; border-radius: 14px; overflow: hidden; border: 1px solid #2a4a5e; }
  .rounds-header { display: grid; grid-template-columns: 30px 1fr 1fr; padding: 10px 16px; font-size: 10px; color: #7a9bb0; letter-spacing: 1.5px; text-transform: uppercase; border-bottom: 1px solid #2a4a5e; }
  .rounds-header span:last-child { text-align: right; }
  .round-row { display: grid; grid-template-columns: 30px 1fr 1fr; padding: 10px 16px; font-size: 15px; border-bottom: 1px solid #162636; }
  .round-row:last-child { border-bottom: none; }
  .rnum { color: #3a5a70; font-size: 11px; display: flex; align-items: center; }
  .ra { color: #ff6666; font-weight: 500; } .rb { color: #6699ff; font-weight: 500; text-align: right; }
  .empty-msg { padding: 20px; text-align: center; font-size: 13px; color: #3a5a70; }
  .win-overlay { display: none; position: fixed; inset: 0; background: rgba(0,10,20,0.85); align-items: center; justify-content: center; z-index: 10; }
  .win-overlay.show { display: flex; }
  .win-box { background: #1a2e3f; border: 1px solid #2a4a5e; border-radius: 20px; padding: 36px 40px; text-align: center; width: 80%; }
  .win-label { font-size: 11px; color: #7a9bb0; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
  .win-name { font-size: 32px; font-weight: 500; color: #e0eaf2; margin-bottom: 4px; }
  .win-score-txt { font-size: 13px; color: #7a9bb0; margin-bottom: 20px; }
  .btn-restart { background: #1d6a3a; color: #d0ffe0; border: none; border-radius: 10px; padding: 12px 28px; font-size: 14px; font-family: inherit; cursor: pointer; }
</style>
</head>
<body>
  <div class="score-band">
    <div class="team-block"><div class="team-label" id="name-a" onclick="editName('a')">Team A</div><div class="team-score score-a" id="total-a">0</div></div>
    <div class="divider-col">:</div>
    <div class="team-block right"><div class="team-label" id="name-b" onclick="editName('b')">Team B</div><div class="team-score score-b" id="total-b">0</div></div>
  </div>
  <div class="input-card">
    <div class="input-row">
      <input class="score-input" id="inp-a" type="number" inputmode="numeric" placeholder="0">
      <input class="score-input" id="inp-b" type="number" inputmode="numeric" placeholder="0">
    </div>
    <div class="adj-row">
      <div class="adj-pair"><button class="btn-adj plus" onclick="adjust('a',100)">+100</button><button class="btn-adj minus" onclick="adjust('a',-100)">-100</button></div>
      <div class="adj-pair"><button class="btn-adj plus" onclick="adjust('b',100)">+100</button><button class="btn-adj minus" onclick="adjust('b',-100)">-100</button></div>
    </div>
    <div class="btn-row"><button class="btn-add" id="btn-add" onclick="addRound()">라운드 추가</button><button class="btn-undo" onclick="undoRound()">↩</button></div>
    <p class="hint" id="hint"></p>
  </div>
  <div class="rounds-card">
    <div class="rounds-header"><span>#</span><span>Team A</span><span style="text-align:right">Team B</span></div>
    <div id="rounds-list"><div class="empty-msg">아직 라운드가 없습니다</div></div>
  </div>
  <div class="win-overlay" id="win-overlay">
    <div class="win-box"><p class="win-label">Winner</p><p class="win-name" id="win-name"></p><p class="win-score-txt" id="win-score"></p><button class="btn-restart" onclick="restartGame()">새 게임 시작</button></div>
  </div>
<script>
  const WIN=1000;let rounds=[];let names={a:'Team A',b:'Team B'};
  const inpA=document.getElementById('inp-a'),inpB=document.getElementById('inp-b'),btnAdd=document.getElementById('btn-add'),hint=document.getElementById('hint');
  function lastTwo(v){if(v===''||isNaN(Number(v)))return null;return Math.abs(parseInt(v))%100;}
  function valid(v){if(v===''||isNaN(Number(v)))return true;return Math.abs(parseInt(v))%10===0||Math.abs(parseInt(v))%10===5;}
  function autoVal(v){const t=lastTwo(v);if(t===null||t===0)return '';return String(100-t);}
  function validate(){const va=inpA.value,vb=inpB.value,okA=valid(va),okB=valid(vb);inpA.classList.toggle('invalid',!okA);inpB.classList.toggle('invalid',!okB);btnAdd.disabled=!(okA&&okB&&!(va===''&&vb===''));hint.textContent=(!okA||!okB)?'1의 자리는 0 또는 5만 입력 가능합니다':'';}
  inpA.addEventListener('input',()=>{if(!inpB.matches(':focus')){const a=autoVal(inpA.value);if(a!==''){inpB.value=a;inpB.classList.add('auto');}else{inpB.value='';inpB.classList.remove('auto');}}validate();});
  inpB.addEventListener('input',()=>{if(!inpA.matches(':focus')){const a=autoVal(inpB.value);if(a!==''){inpA.value=a;inpA.classList.add('auto');}else{inpA.value='';inpA.classList.remove('auto');}}validate();});
  inpA.addEventListener('focus',()=>{if(inpA.classList.contains('auto')){inpA.value='';inpA.classList.remove('auto');validate();}});
  inpB.addEventListener('focus',()=>{if(inpB.classList.contains('auto')){inpB.value='';inpB.classList.remove('auto');validate();}});
  function adjust(t,d){const i=t==='a'?inpA:inpB;i.value=(parseInt(i.value)||0)+d;i.classList.remove('auto');validate();}
  function addRound(){if(btnAdd.disabled)return;const a=parseInt(inpA.value)||0,b=parseInt(inpB.value)||0;rounds.push({a,b});inpA.value='';inpB.value='';inpA.classList.remove('auto','invalid');inpB.classList.remove('auto','invalid');hint.textContent='';btnAdd.disabled=true;render();checkWin();}
  function undoRound(){if(!rounds.length)return;rounds.pop();render();}
  function render(){const ta=rounds.reduce((s,r)=>s+r.a,0),tb=rounds.reduce((s,r)=>s+r.b,0);const eA=document.getElementById('total-a'),eB=document.getElementById('total-b');eA.textContent=ta;eB.textContent=tb;eA.classList.remove('leading');eB.classList.remove('leading');if(ta>tb)eA.classList.add('leading');else if(tb>ta)eB.classList.add('leading');const l=document.getElementById('rounds-list');l.innerHTML=rounds.length?rounds.map((r,i)=>'<div class="round-row"><span class="rnum">'+(i+1)+'</span><span class="ra">'+(r.a>=0?'+':'')+r.a+'</span><span class="rb">'+(r.b>=0?'+':'')+r.b+'</span></div>').join(''):'<div class="empty-msg">아직 라운드가 없습니다</div>';}
  function checkWin(){const ta=rounds.reduce((s,r)=>s+r.a,0),tb=rounds.reduce((s,r)=>s+r.b,0);if(ta>=WIN||tb>=WIN){const w=ta>=tb;document.getElementById('win-name').textContent=w?names.a:names.b;document.getElementById('win-score').textContent=(w?ta:tb)+' : '+(w?tb:ta);document.getElementById('win-overlay').classList.add('show');}}
  function restartGame(){rounds=[];document.getElementById('win-overlay').classList.remove('show');render();}
  function editName(t){const n=prompt('팀 이름 변경:',names[t]);if(n&&n.trim()){names[t]=n.trim();document.getElementById('name-'+t).textContent=names[t];}}
  document.addEventListener('keydown',e=>{if(e.key==='Enter'&&!btnAdd.disabled)addRound();});
  render();
</script>
</body>
</html>
