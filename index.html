<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Tichu & Crokinole Scoreboard</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tichu">
<meta name="theme-color" content="#0f1f2e">
<link rel="manifest" href="manifest.json">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f1f2e; min-height: 100vh; padding: 28px 20px 40px; font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif; position: relative; }

  .score-band { background: #1a2e3f; border-radius: 14px; padding: 14px 16px; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #2a4a5e; }
  .team-block { flex: 1; display: flex; flex-direction: column; }
  .team-block.right { align-items: stretch; text-align: right; }
  .team-label { font-size: 10px; color: #7a9bb0; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 2px; cursor: pointer; display: block; padding-bottom: 1px; border-bottom: 1px dashed #2a4a5e; }
  .team-score { font-size: 58px; font-weight: 500; line-height: 1; display: inline-block; border-radius: 10px; padding: 2px 6px; border: 3px solid transparent; transition: border-color 0.3s; }
  .score-a { color: #ff4444; }
  .score-b { color: #4488ff; }
  .score-a.leading { border-color: #4488ff; }
  .score-b.leading { border-color: #ff4444; }
  .divider-col { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 8px; gap: 8px; }
  .game-btn { background: #0f1f2e; border: 1px solid #2a4a5e; border-radius: 9px; padding: 10px 12px; font-size: 12px; font-weight: 500; font-family: inherit; color: #4a6a80; cursor: pointer; text-align: center; transition: all 0.15s; -webkit-tap-highlight-color: transparent; width: 80px; }
  .game-btn.active { background: #1d3a52; border-color: #4a8fa8; color: #e0eaf2; }

  .input-card { background: #1a2e3f; border-radius: 14px; padding: 16px 18px; margin-bottom: 14px; border: 1px solid #2a4a5e; }
  .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 8px; }
  .score-input { width: 100%; background: #0f1f2e; border: 1px solid #2a4a5e; border-radius: 10px; padding: 12px; font-size: 24px; font-weight: 500; text-align: center; color: #e0eaf2; outline: none; font-family: inherit; transition: border-color 0.15s; -moz-appearance: textfield; }
  .score-input::-webkit-outer-spin-button, .score-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .score-input:focus { border-color: #4a8fa8; }
  .score-input.auto { color: #3a5a70; }
  .score-input.invalid { border-color: #cc2200; background: #1f1010; }

  .adj-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .adj-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
  .btn-adj { background: #0f1f2e; border: 1px solid #2a4a5e; border-radius: 8px; padding: 10px 0; font-size: 13px; font-weight: 500; font-family: inherit; cursor: pointer; text-align: center; -webkit-tap-highlight-color: transparent; }
  .btn-adj:active { background: #1a3a50; }
  .btn-adj.plus { color: #44cc77; }
  .btn-adj.minus { color: #ff6644; }

  .btn-row { display: grid; grid-template-columns: 1fr 48px; gap: 8px; }
  .btn-add { background: #1d6a3a; color: #d0ffe0; border: none; border-radius: 10px; padding: 15px; font-size: 15px; font-family: inherit; font-weight: 500; cursor: pointer; letter-spacing: 0.5px; -webkit-tap-highlight-color: transparent; }
  .btn-add:active:not(:disabled) { background: #227a42; }
  .btn-add:disabled { background: #1a2e3f; border: 1px solid #2a4a5e; color: #3a5a70; cursor: not-allowed; }
  .btn-undo { background: #1a2e3f; border: 1px solid #2a4a5e; border-radius: 10px; font-size: 18px; cursor: pointer; color: #7a9bb0; -webkit-tap-highlight-color: transparent; }
  .btn-undo:active { background: #223a4e; }
  .hint { font-size: 11px; color: #cc4422; text-align: center; margin-top: 8px; min-height: 16px; }

  .rounds-card { background: #1a2e3f; border-radius: 14px; overflow: hidden; border: 1px solid #2a4a5e; }
  .rounds-header { display: grid; grid-template-columns: 30px 1fr 1fr; padding: 10px 16px; font-size: 10px; color: #7a9bb0; letter-spacing: 1.5px; text-transform: uppercase; border-bottom: 1px solid #2a4a5e; }
  .rounds-header span:last-child { text-align: right; }
  .round-row { display: grid; grid-template-columns: 30px 1fr 1fr; padding: 10px 16px; font-size: 15px; border-bottom: 1px solid #162636; }
  .round-row:last-child { border-bottom: none; }
  .rnum { color: #3a5a70; font-size: 11px; display: flex; align-items: center; }
  .ra { color: #ff6666; font-weight: 500; }
  .rb { color: #6699ff; font-weight: 500; text-align: right; }
  .empty-msg { padding: 20px; text-align: center; font-size: 13px; color: #3a5a70; }

  .win-overlay { display: none; position: fixed; inset: 0; background: rgba(0,10,20,0.85); align-items: center; justify-content: center; z-index: 10; }
  .switch-overlay { display: none; position: fixed; inset: 0; background: rgba(0,10,20,0.85); align-items: center; justify-content: center; z-index: 20; }
  .switch-overlay.show { display: flex; }
  .switch-box { background: #1a2e3f; border: 1px solid #2a4a5e; border-radius: 16px; padding: 28px 24px; text-align: center; width: 82%; }
  .switch-msg { font-size: 14px; color: #e0eaf2; line-height: 1.6; margin-bottom: 20px; }
  .switch-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn-switch-confirm { background: #8b2020; color: #ffe0e0; border: none; border-radius: 10px; padding: 12px; font-size: 14px; font-family: inherit; font-weight: 500; cursor: pointer; }
  .btn-switch-cancel { background: #1a2e3f; color: #7a9bb0; border: 1px solid #2a4a5e; border-radius: 10px; padding: 12px; font-size: 14px; font-family: inherit; cursor: pointer; }
  .win-overlay.show { display: flex; }
  .win-box { background: #1a2e3f; border: 1px solid #2a4a5e; border-radius: 20px; padding: 36px 40px; text-align: center; width: 80%; }
  .win-label { font-size: 11px; color: #7a9bb0; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
  .win-name { font-size: 32px; font-weight: 500; color: #e0eaf2; margin-bottom: 4px; }
  .win-score-txt { font-size: 13px; color: #7a9bb0; margin-bottom: 20px; }
  .btn-restart { background: #1d6a3a; color: #d0ffe0; border: none; border-radius: 10px; padding: 12px 28px; font-size: 14px; font-family: inherit; cursor: pointer; }
</style>
</head>
<body>

  <div class="score-band">
    <div class="team-block">
      <div class="team-label" id="name-a" onclick="editName('a')">Team A</div>
      <div class="team-score score-a" id="total-a">0</div>
    </div>
    <div class="divider-col">
      <button class="game-btn active" id="btn-tichu" onclick="selectGame('tichu')">Tichu</button>
      <button class="game-btn" id="btn-crokinole" onclick="selectGame('crokinole')">Crokinole</button>
    </div>
    <div class="team-block right">
      <div class="team-label" id="name-b" onclick="editName('b')">Team B</div>
      <div class="team-score score-b" id="total-b">0</div>
    </div>
  </div>

  <div class="input-card">
    <div class="input-row">
      <input class="score-input" id="inp-a" type="number" inputmode="numeric" placeholder="0" />
      <input class="score-input" id="inp-b" type="number" inputmode="numeric" placeholder="0" />
    </div>
    <div class="adj-row" id="adj-row">
      <div class="adj-pair">
        <button class="btn-adj plus" onclick="adjust('a', 100)">+100</button>
        <button class="btn-adj minus" onclick="adjust('a', -100)">−100</button>
      </div>
      <div class="adj-pair">
        <button class="btn-adj plus" onclick="adjust('b', 100)">+100</button>
        <button class="btn-adj minus" onclick="adjust('b', -100)">−100</button>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-add" id="btn-add" onclick="addRound()">점수 입력 / 라운드 추가</button>
      <button class="btn-undo" onclick="undoRound()">↩</button>
    </div>
    <p class="hint" id="hint"></p>
  </div>

  <div class="rounds-card">
    <div class="rounds-header">
      <span>#</span><span>Team A</span><span style="text-align:right">Team B</span>
    </div>
    <div id="rounds-list">
      <div class="empty-msg">아직 라운드가 없습니다</div>
    </div>
  </div>

  <div class="win-overlay" id="win-overlay">
    <div class="win-box">
      <p class="win-label">Winner</p>
      <p class="win-name" id="win-name"></p>
      <p class="win-score-txt" id="win-score"></p>
      <button class="btn-restart" onclick="restartGame()">새 게임 시작</button>
    </div>
  </div>

<script>
  let WIN = 1000;
  let gameMode = 'tichu';
  let pendingMode = null;
  let rounds = [];
  let names = { a: 'Team A', b: 'Team B' };

  const inpA = document.getElementById('inp-a');
  const inpB = document.getElementById('inp-b');
  const btnAdd = document.getElementById('btn-add');
  const hint = document.getElementById('hint');

  function isValidScore(v) {
    if (v === '' || isNaN(Number(v))) return true;
    return Math.abs(parseInt(v)) % 10 === 0 || Math.abs(parseInt(v)) % 10 === 5;
  }
  function getAutoVal(v) {
    if (v === '' || isNaN(Number(v))) return '';
    const n = parseInt(v);
    if (n < 0) {
      return String(100 - n);
    } else {
      const t = n % 100;
      if (t === 0) return '';
      return String(100 - t);
    }
  }
  function validate() {
    const va = inpA.value, vb = inpB.value;
    const okA = gameMode === 'tichu' ? isValidScore(va) : (va === '' || !isNaN(Number(va)));
    const okB = gameMode === 'tichu' ? isValidScore(vb) : (vb === '' || !isNaN(Number(vb)));
    inpA.classList.toggle('invalid', !okA);
    inpB.classList.toggle('invalid', !okB);
    btnAdd.disabled = !(okA && okB && !(va === '' && vb === ''));
    hint.textContent = (!okA || !okB) ? '1의 자리는 0 또는 5만 입력 가능합니다' : '';
  }
  inpA.addEventListener('input', () => {
    if (gameMode === 'tichu' && !inpB.matches(':focus')) {
      const auto = getAutoVal(inpA.value);
      if (auto !== '') { inpB.value = auto; inpB.classList.add('auto'); }
      else { inpB.value = ''; inpB.classList.remove('auto'); }
    } else if (gameMode === 'crokinole' && !inpB.matches(':focus')) {
      if (inpA.value !== '') { inpB.value = '0'; inpB.classList.add('auto'); }
      else { inpB.value = ''; inpB.classList.remove('auto'); }
    }
    validate();
  });
  inpB.addEventListener('input', () => {
    if (gameMode === 'tichu' && !inpA.matches(':focus')) {
      const auto = getAutoVal(inpB.value);
      if (auto !== '') { inpA.value = auto; inpA.classList.add('auto'); }
      else { inpA.value = ''; inpA.classList.remove('auto'); }
    } else if (gameMode === 'crokinole' && !inpA.matches(':focus')) {
      if (inpB.value !== '') { inpA.value = '0'; inpA.classList.add('auto'); }
      else { inpA.value = ''; inpA.classList.remove('auto'); }
    }
    validate();
  });
  inpA.addEventListener('focus', () => { if (inpA.classList.contains('auto')) { inpA.value = ''; inpA.classList.remove('auto'); validate(); } });
  inpB.addEventListener('focus', () => { if (inpB.classList.contains('auto')) { inpB.value = ''; inpB.classList.remove('auto'); validate(); } });

  function adjust(team, delta) {
    const inp = team === 'a' ? inpA : inpB;
    inp.value = (parseInt(inp.value) || 0) + delta;
    inp.classList.remove('auto');
    validate();
  }
  function addRound() {
    if (btnAdd.disabled) return;
    const a = parseInt(inpA.value) || 0;
    const b = parseInt(inpB.value) || 0;
    rounds.push({ a, b });
    inpA.value = ''; inpB.value = '';
    inpA.classList.remove('auto', 'invalid');
    inpB.classList.remove('auto', 'invalid');
    hint.textContent = '';
    btnAdd.disabled = true;
    render(); checkWin();
  }
  function undoRound() {
    if (!rounds.length) return;
    rounds.pop(); render();
  }
  function render() {
    const ta = rounds.reduce((s, r) => s + r.a, 0);
    const tb = rounds.reduce((s, r) => s + r.b, 0);
    const elA = document.getElementById('total-a');
    const elB = document.getElementById('total-b');
    elA.textContent = ta; elB.textContent = tb;
    elA.classList.remove('leading'); elB.classList.remove('leading');
    if (ta > tb) elA.classList.add('leading');
    else if (tb > ta) elB.classList.add('leading');
    const list = document.getElementById('rounds-list');
    if (!rounds.length) {
      list.innerHTML = '<div class="empty-msg">아직 라운드가 없습니다</div>';
    } else {
      list.innerHTML = rounds.map((r, i) => `
        <div class="round-row">
          <span class="rnum">${i + 1}</span>
          <span class="ra">${r.a >= 0 ? '+' : ''}${r.a}</span>
          <span class="rb">${r.b >= 0 ? '+' : ''}${r.b}</span>
        </div>`).join('');
    }
  }
  function checkWin() {
    const ta = rounds.reduce((s, r) => s + r.a, 0);
    const tb = rounds.reduce((s, r) => s + r.b, 0);
    if (ta >= WIN || tb >= WIN) {
      const aWins = ta >= tb;
      document.getElementById('win-name').textContent = aWins ? names.a : names.b;
      document.getElementById('win-score').textContent = `${aWins ? ta : tb} : ${aWins ? tb : ta}`;
      document.getElementById('win-overlay').classList.add('show');
    }
  }
  function restartGame() {
    rounds = [];
    document.getElementById('win-overlay').classList.remove('show');
    render();
  }
  function selectGame(mode) {
    if (mode === gameMode) return;
    const ta = rounds.reduce((s, r) => s + r.a, 0);
    const tb = rounds.reduce((s, r) => s + r.b, 0);
    if ((ta !== 0 || tb !== 0) && rounds.length > 0) {
      pendingMode = mode;
      document.getElementById('switch-overlay').classList.add('show');
      return;
    }
    gameMode = mode;
    WIN = mode === 'tichu' ? 1000 : 100;
    document.getElementById('btn-tichu').classList.toggle('active', mode === 'tichu');
    document.getElementById('btn-crokinole').classList.toggle('active', mode === 'crokinole');
    const steps = mode === 'tichu' ? 100 : 5;
    document.querySelector('#adj-row .adj-pair:nth-child(1) .plus').textContent = '+' + steps;
    document.querySelector('#adj-row .adj-pair:nth-child(1) .minus').textContent = '−' + steps;
    document.querySelector('#adj-row .adj-pair:nth-child(2) .plus').textContent = '+' + steps;
    document.querySelector('#adj-row .adj-pair:nth-child(2) .minus').textContent = '−' + steps;
    document.querySelector('#adj-row .adj-pair:nth-child(1) .plus').onclick = () => adjust('a', steps);
    document.querySelector('#adj-row .adj-pair:nth-child(1) .minus').onclick = () => adjust('a', -steps);
    document.querySelector('#adj-row .adj-pair:nth-child(2) .plus').onclick = () => adjust('b', steps);
    document.querySelector('#adj-row .adj-pair:nth-child(2) .minus').onclick = () => adjust('b', -steps);
    inpA.value = ''; inpB.value = '';
    inpA.classList.remove('auto', 'invalid');
    inpB.classList.remove('auto', 'invalid');
    hint.textContent = '';
    btnAdd.disabled = true;
    rounds = [];
    render();
  }
  function confirmSwitch() {
    document.getElementById('switch-overlay').classList.remove('show');
    const mode = pendingMode;
    pendingMode = null;
    rounds = [];
    gameMode = mode;
    WIN = mode === 'tichu' ? 1000 : 100;
    document.getElementById('btn-tichu').classList.toggle('active', mode === 'tichu');
    document.getElementById('btn-crokinole').classList.toggle('active', mode === 'crokinole');
    const steps = mode === 'tichu' ? 100 : 5;
    document.querySelector('#adj-row .adj-pair:nth-child(1) .plus').textContent = '+' + steps;
    document.querySelector('#adj-row .adj-pair:nth-child(1) .minus').textContent = '−' + steps;
    document.querySelector('#adj-row .adj-pair:nth-child(2) .plus').textContent = '+' + steps;
    document.querySelector('#adj-row .adj-pair:nth-child(2) .minus').textContent = '−' + steps;
    document.querySelector('#adj-row .adj-pair:nth-child(1) .plus').onclick = () => adjust('a', steps);
    document.querySelector('#adj-row .adj-pair:nth-child(1) .minus').onclick = () => adjust('a', -steps);
    document.querySelector('#adj-row .adj-pair:nth-child(2) .plus').onclick = () => adjust('b', steps);
    document.querySelector('#adj-row .adj-pair:nth-child(2) .minus').onclick = () => adjust('b', -steps);
    inpA.value = ''; inpB.value = '';
    inpA.classList.remove('auto', 'invalid');
    inpB.classList.remove('auto', 'invalid');
    hint.textContent = '';
    btnAdd.disabled = true;
    render();
  }
  function cancelSwitch() {
    document.getElementById('switch-overlay').classList.remove('show');
    pendingMode = null;
  }
  function editName(team) {
    const next = prompt('팀 이름 변경:', names[team]);
    if (next && next.trim()) {
      names[team] = next.trim();
      document.getElementById(`name-${team}`).textContent = names[team];
    }
  }
  document.addEventListener('keydown', e => { if (e.key === 'Enter' && !btnAdd.disabled) addRound(); });
  render();
</script>
  <div class="switch-overlay" id="switch-overlay">
    <div class="switch-box">
      <p class="switch-msg">기존 점수가 사라집니다.<br>다시 시작하시겠어요?</p>
      <div class="switch-btns">
        <button class="btn-switch-confirm" onclick="confirmSwitch()">다시 시작</button>
        <button class="btn-switch-cancel" onclick="cancelSwitch()">취소</button>
      </div>
    </div>
  </div>
</body>
</html>
